<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Peserta — Malang</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f4f4f0;
    color: #1a1a1a;
    min-height: 100vh;
  }

  .header {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 1.25rem 1rem 0.75rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .header p {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
    margin-bottom: 0.75rem;
  }

  .search-wrap { padding: 0 1rem 0.75rem; background: #1a1a1a; }
  .search-box {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 0 12px;
    gap: 8px;
  }
  .search-icon { font-size: 15px; color: rgba(255,255,255,0.45); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 14px;
    padding: 10px 0;
    font-family: inherit;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.35); }
  .clear-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.45);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    display: none;
    line-height: 1;
  }
  .clear-btn.visible { display: block; }

  .nav-wrap {
    background: #1a1a1a;
    padding: 0 0.75rem 0.75rem;
    position: sticky;
    top: 130px;
    z-index: 99;
  }
  .nav-wrap.hidden { display: none; }
  .nav-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: 0 0 auto;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .tab-btn.active { background: #fff; color: #1a1a1a; border-color: #fff; }

  .container { max-width: 480px; margin: 0 auto; padding: 1rem; }

  /* Search results */
  .search-results { display: none; }
  .search-results.active { display: block; }
  .search-results-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .search-empty { text-align: center; padding: 2.5rem 1rem; color: #aaa; font-size: 14px; }
  .search-empty span { display: block; font-size: 28px; margin-bottom: 8px; }

  /* Result row */
  .participant-list { display: flex; flex-direction: column; gap: 5px; }
  .participant-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #fff;
    border-radius: 10px;
    padding: 11px 14px;
    border: 1px solid #eeeee9;
  }
  .no-num { font-size: 11px; font-weight: 600; color: #bbb; min-width: 20px; text-align: right; }
  .participant-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.3px;
    flex: 1;
    line-height: 1.3;
  }
  .participant-name mark { background: #ffe600; color: #1a1a1a; border-radius: 3px; padding: 0 1px; }

  /* Search result card — clickable */
  .result-card {
    background: #fff;
    border-radius: 10px;
    border: 1px solid #eeeee9;
    overflow: hidden;
    margin-bottom: 5px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .result-card:active { border-color: #ffe600; }

  .result-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
  }
  .result-name {
    font-size: 13.5px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.3px;
    flex: 1;
    line-height: 1.3;
  }
  .result-name mark { background: #ffe600; color: #1a1a1a; border-radius: 3px; padding: 0 1px; }

  .group-badge {
    font-size: 10px;
    font-weight: 700;
    background: #1a1a1a;
    color: #fff;
    padding: 4px 9px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .expand-arrow {
    font-size: 13px;
    color: #bbb;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .result-card.open .expand-arrow { transform: rotate(180deg); }

  /* Expanded group members inside result card */
  .group-members {
    display: none;
    border-top: 1px solid #f0f0ec;
    background: #fafaf8;
    padding: 8px 0;
  }
  .result-card.open .group-members { display: block; }

  .group-members-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #aaa;
    text-transform: uppercase;
    padding: 4px 14px 8px;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid #f0f0ec;
  }
  .member-row:last-child { border-bottom: none; }
  .member-row.active-member { background: #fffbe6; }
  .member-no { font-size: 11px; color: #ccc; font-weight: 600; min-width: 18px; text-align: right; }
  .member-name { font-size: 13px; font-weight: 600; color: #1a1a1a; flex: 1; line-height: 1.3; }
  .member-name.active-name { color: #1a1a1a; }
  .member-name mark { background: #ffe600; color: #1a1a1a; border-radius: 3px; padding: 0 1px; }
  .you-tag {
    font-size: 10px;
    font-weight: 700;
    background: #ffe600;
    color: #1a1a1a;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  /* Room card in expand */
  .room-sub-card {
    margin: 4px 10px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid #eeeee9;
    overflow: hidden;
  }
  .room-sub-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #bbb;
    text-transform: uppercase;
    padding: 6px 12px 4px;
  }
  .room-sub-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    padding: 4px 12px;
    line-height: 1.35;
  }
  .room-sub-name.highlighted { background: #fffbe6; }
  .room-sub-name mark { background: #ffe600; color: #1a1a1a; border-radius: 3px; padding: 0 1px; }
  .room-sub-divider { height: 1px; background: #f0f0ec; margin: 0 12px; }
  .room-gap { height: 6px; }

  /* Group panels (browse mode) */
  .group-panel { display: none; }
  .group-panel.active { display: block; }
  .group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .group-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #888; text-transform: uppercase; }
  .group-count { font-size: 11px; font-weight: 600; background: #e8e8e4; color: #555; padding: 3px 10px; border-radius: 20px; }

  .room-card { background: #fff; border-radius: 10px; border: 1px solid #eeeee9; padding: 11px 14px; margin-bottom: 5px; }
  .room-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #bbb; margin-bottom: 6px; text-transform: uppercase; }
  .room-name { font-size: 13.5px; font-weight: 600; color: #1a1a1a; letter-spacing: 0.3px; padding: 2px 0; line-height: 1.35; }
  .room-divider { height: 1px; background: #f0f0ec; margin: 5px 0; }

  .bottom-note { text-align: center; font-size: 11px; color: #aaa; margin-top: 1.5rem; padding-bottom: 2rem; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="header">
  <h1>Daftar Peserta</h1>
  <p>HOTEL ROOM — MALANG</p>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="searchInput" placeholder="Cari nama peserta..." autocomplete="off" />
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
</div>

<div class="nav-wrap" id="navWrap">
  <div class="nav-tabs" id="navTabs"></div>
</div>

<div class="container">
  <div class="search-results" id="searchResults">
    <div class="search-results-label" id="searchLabel"></div>
    <div id="searchList"></div>
    <div class="search-empty" id="searchEmpty" style="display:none">
      <span>🔎</span>
      Nama tidak ditemukan
    </div>
  </div>
  <div id="groupPanels"></div>
</div>

<script>
const groups = {
  1: ["AAN WISNU PRADANA","ABDUL MUIZ","ADE ABDUL MUHYI","ADI WINATA","ADITYA MAULANA SIDIQ","ADIZA DWIANDRINI","AFINA NABILA MAZEDI","AGAZA DWI UTOMO","AHMAD ADRIAN","AHMAD DEFI IRAWAN","AHMAD JUNAEDI","AHMAD MOHAMMAD MUAMAR","AIDIL AKBAR","AKBAR HASYIM","AKBAR JANUARI FADLIH","ALBERT FERNANDO SARDION ARITONANG","ALDI JULIALDI","ALDILA RAHMAN","ALDY AINUS SHOFA","ALI MAHFUD"],
  2: ["ALKINDI HAYUNING CAHYA","AMINAH ZAINAB","ANDREAS SETIAWAN","ANKI TAFTAZANI","ANNISA LUTHFY PUTRI PRAMATA","ANNISHFIA LAILATUR ROHMAH","ANNISSA PERMANASARI","AQIL BUDIMAN","ARDI DARWIN","ARDIANSYAH ARDIANSYAH","ARIS MUNANDAR MUNANDAR","ARWISMAL ARWISMAL","ASHLEY SETIADI","AUSTY INTANIA DWI PUTRI","BAYU WIDYANANTO","BERNARD JATMIKA LAKSANA","BUDIARTI ENDANG LESTARI","CALVIN ADITYA RENATA","CARISSA JESSLYN SIENERA","DANIEL GILBERT H PARDEDE"],
  3: ["DANIEL SIMATUPANG","DAVA MAULANA MALIK","DAVID DARMAWAN","DEA RAHMAWARDANI","DEA SARRA PRAMUDHITA","DEDE MESA BAKTI","DESYAFA AZIZAH QALBI","DEVICA WINATA","DEVY GANISTYA","DHEA SANDRINA","DIESA FASYA PRATAMA","DIMAS ADITYA PUTRA","DIMAS APRIANDANA","EDWARD EXAUDI DOHARA SIAHAAN","EGA BAGAS BAYU SEGARA","ENCEP SURYADI","ERIS KURNIAWAN","EVI ANGGRAINI","FACHRI DESAILY RAMADHAN","FARHAN TIARRAFI PRATAMA"],
  4: ["FARIDA YULIANI","FARIDHATUL UNSIYYAH","FARKHIYAH FARKHIYAH","FATMA INDAH SARI","FAZAR REZHA FAUZY","FEBRI KURNIA HANDOKO","FERRY HARTANTO","FHERLY FIHEN YUTRA","FIKRI MUSTHOFA","FIRAZ FIRAZ","FIYA IZZA ANBIYA","FRANSISKUS RAFAEL HARYADI","HAGATA AERSADA GINTING","HAIDAR ALI","HANDARI NUSA PUTRI","HANITA NIAN SARI","HELI JOYO PRASETYO","HENDRY DWI MIYANTO","HIKMAH GUSTAMA NATAPRADJA","HILLYA HILLYA"],
  5: ["IDA EL METHELINA MANIK","IGNATIUS ENRICO BRAMANTYA","ILHAM ASYAUFI SAPUTRA","ILHAM BURHANNUDIN RASYID","IMMANUEL GIUSTINO","JEJEN ZAENUDIN ARIF","JESSICA JESSICA","JIHADUL RAHMAN","KANIA EMYRA DJAROT","KARYN GABRIELLA","KHAERUL ANWAR","KHAFID KURNIAWAN JATI","KURNIA ANASTHASIA KALUTI","LEONARDO ANDRIAN","LUCKY LUTHFITO WIJAYA","LULUS SATRIA PEARL","LUTFIL KHAKIM","M HERSA KURNIAWAN","M SUTANTO GUMAY","M SYAFAAT RAHADHI"],
  6: ["MANGIRING SIAGIAN","MANJIT KUMAR PANDEY","MAR'ATUS SHOLICHAH","MARLIANA ATMI RAHAYU","MATIUS ALEXANDER SITORUS","MERCYS LUCYA NATALIA TAMBUNAN","MILENIA JOVANCA MUNTHE","MIZAN SANUBARI","MOCHAMAD RIZALDI","MOCHAMMAD RIZKY LAZUARDI","MOHAMAD ALIEF ZAIDAN SYAFIQ","MOHAMMAD YUSUF ADIO ANSHORI","MUCHLAS SOBARI NOVIYANTO","MUHAJIR","MUHAMMAD ADIB HADIYAN SHAH","MUHAMMAD ASHRAF","MUHAMMAD FIANSA DWI ANANTO","MUHAMMAD GHAFY RIZQILLA FATHONI","MUHAMMAD RAFLI FIRMANSYAH","MUHAMMAD RIZKY KARIM"],
  7: ["MUTHIA AZ-ZAHRA","NABILLA RAFAINI PUTRI","NADIA PRATIWI","NAUFAL AFIF AMRULLOH","NENDEN KURNIASIH ANGGRAENI","NIKEN RANIAH WARAD","NIKO SETIAWAN","NINDYA TRI UTAMA","NOVIAN LAMANDA PUTRA","NOVIANI DWI SAPUTRI","NUGROHO TRI ATMAJA","NUR ILHAM RAMADHAN","NURSAYYIDAH AINUN JAHSY","NURUL ISNAYNI","ODE FAKHRINA","PAUNDRA DWI LAKSONO","PEBRI JOKO ATMOKO","POPY SISWOYO","PRAMADYA ANGGARA ANGGARA","PURNIMA DEWI SYABANI"],
  8: ["PUTRI BIRRU PUSPA PRADANOV","PUTRI PRADANI","RAHMAT MULYADI NASUTION","RANGGA ANDRIAN WARDHANA","RENDI RIANA","RIAN TRIANDI","RICHARD WILIAM","RIDHO BASTIAN","RIKKY MANALU","RIO ADITYA RAMADHANA","RIZKI DWI NUGRAHA","ROY KURNIAWAN TADJOEDIN","SAFIRA ANINDITA","SAMUEL ADITYA CHRISTIANTA","SANDRINA THERESYA PURBA","SANTIKA CIPTAWIJAYA","SANTIKA NINDYA HAPSARI WIBOWO","SARTIKA DEWI","SENDY GUNAWAN","SHAGOVA MAULANA KHALAFIANO"],
  9: ["SHERINA DEBORA MELLINNIA","SIGIT HERNAWAN","SITTA FAHMI AINI","SOJUARGON SYAH BINTANG SIMATUPANG","SOPYAN SYAURI","STEVEN ANTONIO","SUWANTO SUWANTO","SYAHRUL RAMADAN","TITIK LESTARI","TITO ADI NUGROHO","TUBAGUS IRVAN KURNIAWAN","URI ANA","VERA AMELIA PERMATASARI","VINCENTIA ADELINA HARIYANTO","WAWAN INDRIARDI PUTRA","WIDYA PIQRA","WILLASTA HARIADI SURBAKTI","WINDRA BAYU BASTIAN","YAN CAHYO","YEVIE RISFIAN PEBRIANI","YU ZHU","YUSTINA MYRNA ARIELLA","YUSUF MUHAMMAD ARIEF","ZAKARIAS NITI SUKMA ATMAJA","ZIDNI ZAKIYYAH AHMAD"],
  10: [
    ["AAN ROMADONI","NURITA ENDARWATI"],
    ["AGE TEGARI GERALDIANA","ILHAM PRASETYO AJI"],
    ["ALIFIA RETA PANGESTI","YUDHA PRATAMA NUGRAHA"],
    ["AMANDA PAVITA","MOHAMMAD RIZKY KURNIAWAN"],
    ["ARDIANTO BAYUAJI MAHARDIKA","ERLINA RATNASARI"],
    ["HABRAN ZALI","MESI RIA SUKMA"],
    ["HENGKI PRIMA ARI PRADANA","INDAH MAYA SOFIE"],
    ["KAVIN YUDHITIA","RIZA NOVIA PRATIWI"],
    ["NISA RIDHAYATI","BONNI"],
    ["MUHAMMAD ARDYANTHO","RISNA SUCI AYU"],
    ["FITRIANINGSIH FITRIANINGSIH","ARIS YUDI PRASETYA"],
    ["SRI NOVIDAYANTI","TRIANTO"]
  ]
};

// Flatten all for search
const allParticipants = [];
for (let g = 1; g <= 9; g++) {
  groups[g].forEach((name, idx) => {
    allParticipants.push({ name, group: g, no: idx + 1, type: 'regular' });
  });
}
groups[10].forEach((pair, idx) => {
  pair.forEach(name => {
    allParticipants.push({ name, group: 10, room: idx + 1, type: 'room' });
  });
});

const navTabs = document.getElementById('navTabs');
const groupPanels = document.getElementById('groupPanels');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const searchResults = document.getElementById('searchResults');
const searchList = document.getElementById('searchList');
const searchLabel = document.getElementById('searchLabel');
const searchEmpty = document.getElementById('searchEmpty');
const navWrap = document.getElementById('navWrap');

// Build nav tabs
for (let g = 1; g <= 10; g++) {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (g === 1 ? ' active' : '');
  btn.textContent = 'GRP ' + g;
  btn.setAttribute('data-g', g);
  btn.onclick = () => switchGroup(g);
  navTabs.appendChild(btn);
}

// Build group panels
for (let g = 1; g <= 10; g++) {
  const panel = document.createElement('div');
  panel.className = 'group-panel' + (g === 1 ? ' active' : '');
  panel.id = 'panel-' + g;

  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  const lbl = document.createElement('div');
  lbl.className = 'group-label';
  lbl.textContent = 'Group ' + g;
  hdr.appendChild(lbl);

  const list = document.createElement('div');
  list.className = 'participant-list';

  if (g === 10) {
    const cnt = document.createElement('div');
    cnt.className = 'group-count';
    cnt.textContent = (groups[10].length * 2) + ' peserta · ' + groups[10].length + ' kamar';
    hdr.appendChild(cnt);
    panel.appendChild(hdr);

    groups[10].forEach((pair, idx) => {
      const card = document.createElement('div');
      card.className = 'room-card';
      const rlbl = document.createElement('div');
      rlbl.className = 'room-label';
      rlbl.textContent = 'Kamar ' + (idx + 1);
      card.appendChild(rlbl);
      pair.forEach((name, i) => {
        if (i > 0) { const d = document.createElement('div'); d.className = 'room-divider'; card.appendChild(d); }
        const n = document.createElement('div');
        n.className = 'room-name';
        n.textContent = name;
        card.appendChild(n);
      });
      list.appendChild(card);
    });
  } else {
    const members = groups[g];
    const cnt = document.createElement('div');
    cnt.className = 'group-count';
    cnt.textContent = members.length + ' peserta';
    hdr.appendChild(cnt);
    panel.appendChild(hdr);

    members.forEach((name, idx) => {
      const row = document.createElement('div');
      row.className = 'participant-row';
      const no = document.createElement('div');
      no.className = 'no-num';
      no.textContent = idx + 1;
      const nm = document.createElement('div');
      nm.className = 'participant-name';
      nm.textContent = name;
      row.appendChild(no);
      row.appendChild(nm);
      list.appendChild(row);
    });
  }

  panel.appendChild(list);
  const note = document.createElement('div');
  note.className = 'bottom-note';
  note.textContent = 'HOTEL ROOM — MALANG';
  panel.appendChild(note);
  groupPanels.appendChild(panel);
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toUpperCase().indexOf(query.toUpperCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function buildGroupMembers(groupNum, activeName, query) {
  const wrap = document.createElement('div');
  wrap.className = 'group-members';

  const title = document.createElement('div');
  title.className = 'group-members-title';

  if (groupNum === 10) {
    title.textContent = 'Semua anggota Group 10';
    wrap.appendChild(title);

    groups[10].forEach((pair, idx) => {
      const isActiveRoom = pair.includes(activeName);
      const gap = document.createElement('div');
      gap.className = 'room-gap';

      const card = document.createElement('div');
      card.className = 'room-sub-card';
      if (isActiveRoom) card.style.borderColor = '#ffe600';

      const rlbl = document.createElement('div');
      rlbl.className = 'room-sub-label';
      rlbl.textContent = 'Kamar ' + (idx + 1);
      card.appendChild(rlbl);

      pair.forEach((name, i) => {
        if (i > 0) {
          const d = document.createElement('div');
          d.className = 'room-sub-divider';
          card.appendChild(d);
        }
        const nm = document.createElement('div');
        nm.className = 'room-sub-name' + (name === activeName ? ' highlighted' : '');
        nm.innerHTML = highlight(name, query);
        card.appendChild(nm);
      });

      wrap.appendChild(gap);
      wrap.appendChild(card);
    });

    const endGap = document.createElement('div');
    endGap.className = 'room-gap';
    wrap.appendChild(endGap);

  } else {
    title.textContent = 'Semua anggota Group ' + groupNum;
    wrap.appendChild(title);

    groups[groupNum].forEach((name, idx) => {
      const row = document.createElement('div');
      row.className = 'member-row' + (name === activeName ? ' active-member' : '');

      const no = document.createElement('div');
      no.className = 'member-no';
      no.textContent = idx + 1;

      const nm = document.createElement('div');
      nm.className = 'member-name' + (name === activeName ? ' active-name' : '');
      nm.innerHTML = highlight(name, query);

      row.appendChild(no);
      row.appendChild(nm);

      if (name === activeName) {
        const tag = document.createElement('span');
        tag.className = 'you-tag';
        tag.textContent = 'Ini kamu';
        row.appendChild(tag);
      }

      wrap.appendChild(row);
    });
  }

  return wrap;
}

function buildResultCard(p, query) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const main = document.createElement('div');
  main.className = 'result-main';

  const nm = document.createElement('div');
  nm.className = 'result-name';
  nm.innerHTML = highlight(p.name, query);

  const badge = document.createElement('div');
  badge.className = 'group-badge';
  if (p.type === 'room') {
    badge.textContent = 'GRP 10 · KMR ' + p.room;
  } else {
    badge.textContent = 'GRP ' + p.group;
  }

  const arrow = document.createElement('span');
  arrow.className = 'expand-arrow';
  arrow.textContent = '▾';

  main.appendChild(nm);
  main.appendChild(badge);
  main.appendChild(arrow);
  card.appendChild(main);

  const members = buildGroupMembers(p.group, p.name, query);
  card.appendChild(members);

  // Tap to expand/collapse
  main.addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    // Close all others
    document.querySelectorAll('.result-card.open').forEach(c => c.classList.remove('open'));
    if (!isOpen) card.classList.add('open');
  });

  return card;
}

function doSearch(query) {
  const q = query.trim();
  clearBtn.classList.toggle('visible', q.length > 0);

  if (q.length === 0) {
    searchResults.classList.remove('active');
    navWrap.classList.remove('hidden');
    document.querySelectorAll('.group-panel').forEach(p => { p.style.display = ''; });
    switchGroup(1);
    return;
  }

  document.querySelectorAll('.group-panel').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
  navWrap.classList.add('hidden');
  searchResults.classList.add('active');
  searchList.innerHTML = '';
  searchEmpty.style.display = 'none';

  const found = allParticipants.filter(p => p.name.toUpperCase().includes(q.toUpperCase()));

  if (found.length === 0) {
    searchEmpty.style.display = 'block';
    searchLabel.textContent = 'Tidak ada hasil';
    return;
  }

  searchLabel.textContent = found.length + ' peserta ditemukan — ketuk untuk lihat anggota grup';

  found.forEach(p => {
    const card = buildResultCard(p, q);
    searchList.appendChild(card);
  });

  // Auto-expand if only 1 result
  if (found.length === 1) {
    searchList.querySelector('.result-card').classList.add('open');
  }
}

function clearSearch() {
  searchInput.value = '';
  doSearch('');
  searchInput.focus();
}

searchInput.addEventListener('input', (e) => doSearch(e.target.value));

function switchGroup(g) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.getAttribute('data-g')) === g);
  });
  document.querySelectorAll('.group-panel').forEach((p, i) => {
    p.style.display = '';
    p.classList.toggle('active', i === g - 1);
  });
  const activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}
</script>
